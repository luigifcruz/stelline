%YAML 1.2
---
# Holoscan Configuration

scheduler_type: greedy
scheduler:
    check_recession_period_ms: 0
    worker_thread_number: 4
    stop_on_deadlock: true
    stop_on_deadlock_timeout: 500

# Graph

stelline:
    graph:
        transport:
            bit: transport_bit
            configuration: ata_standard_rx
        blade:
            bit: blade_bit
            configuration: blade_correlator
            input:
                in: transport
        writer:
            bit: filesystem_bit
            configuration: file_writer
            input:
                in: blade

# Nodes

ata_standard_rx:
    mode: ata
    gpu_device_id: 0
    interface_address: "0000:c1:00.1"
    master_core: 0
    worker_core: 1
    max_concurrent_bursts: 32
    packets_per_burst: 8192
    max_concurrent_blocks: 16
    output_pool_size: 32
    sorter_depth: 8
    enable_csv_logging: true
    total_block:
        number_of_antennas: 28
        number_of_channels: 192
        number_of_samples: 8192
        number_of_polarizations: 2
    partial_block:
        number_of_antennas: 1
        number_of_channels: 96
        number_of_samples: 16
        number_of_polarizations: 2
    offset_block:
        number_of_antennas: 0
        number_of_channels: 352
        number_of_samples: 0
        number_of_polarizations: 0

blade_correlator:
    input_shape:
        number_of_antennas: 28
        number_of_channels: 192
        number_of_samples: 8192
        number_of_polarizations: 2
    output_shape:
        number_of_antennas: 406
        number_of_channels: 192
        number_of_samples: 1
        number_of_polarizations: 4
    mode: correlator
    number_of_buffers: 4
    options:
        pre_channelizer_stacker_multiplier: 1

        channelizer_bypass: true

        pre_correlator_stacker_multiplier: 1

        correlator_integration_rate: 8192
        correlator_conjugate_antenna_index: 1
        correlator_use_shared_memory: false

file_writer:
    mode: simple_writer
    file_path: ./output.bin
