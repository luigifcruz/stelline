%YAML 1.2
---
# Holoscan Configuration

scheduler_type: greedy
scheduler:
    check_recession_period_ms: 0
    worker_thread_number: 4
    stop_on_deadlock: true
    stop_on_deadlock_timeout: 500

# Graph

stelline:
    graph:
        transport:
            bit: transport_bit
            configuration: ata_standard_rx
        blade:
            bit: blade_bit
            configuration: blade_beamformer
            input:
                in: transport
        writer:
            bit: filesystem_bit
            configuration: file_writer
            input:
                in: blade

# Nodes

ata_standard_rx:
    mode: ata
    gpu_device_id: 0
    interface_address: "0000:01:00.0"
    master_core: 0
    worker_core: 1
    max_concurrent_bursts: 128
    packets_per_burst: 4096
    max_concurrent_blocks: 8
    output_pool_size: 4
    sorter_depth: 4
    enable_csv_logging: true
    subscriptions:
      - source: 10.11.1.201:10000
        destination: 239.1.1.1:50000
      - source: 10.11.1.202:10000
        destination: 239.1.1.1:50000
      - source: 10.11.1.203:10000
        destination: 239.1.1.1:50000
      - source: 10.11.1.204:10000
        destination: 239.1.1.1:50000
      - source: 10.11.1.231:10000
        destination: 239.1.1.1:50000
      - source: 10.11.1.232:10000
        destination: 239.1.1.1:50000
      - source: 10.11.1.233:10000
        destination: 239.1.1.1:50000
      - source: 10.11.1.234:10000
        destination: 239.1.1.1:50000
    total_block:
        number_of_antennas: 28
        number_of_channels: 192
        number_of_samples: 8192
        number_of_polarizations: 2
    partial_block:
        number_of_antennas: 1
        number_of_channels: 96
        number_of_samples: 16
        number_of_polarizations: 2
    offset_block:
        number_of_antennas: 0
        number_of_channels: 352
        number_of_samples: 0
        number_of_polarizations: 0

blade_beamformer:
    input_shape:
        number_of_antennas: 28
        number_of_channels: 192
        number_of_samples: 8192
        number_of_polarizations: 2
    output_shape:
        number_of_antennas: 1
        number_of_channels: 192
        number_of_samples: 8192
        number_of_polarizations: 2
    mode: beamformer
    number_of_buffers: 4
    options:

file_writer:
    mode: dummy_writer
