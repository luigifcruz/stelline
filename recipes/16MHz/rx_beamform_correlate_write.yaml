%YAML 1.2
---
# Holoscan Configuration

scheduler_type: greedy
scheduler:
    check_recession_period_ms: 0
    worker_thread_number: 4
    stop_on_deadlock: true
    stop_on_deadlock_timeout: 500

# Graph

stelline:
    graph:
        transport:
            bit: transport_bit
            configuration: ata_standard_rx

        beamformer:
            bit: blade_bit
            configuration: beamformer
            input:
                in: transport
        beamformer_writer:
            bit: filesystem_bit
            configuration: beamformer_writer
            input:
                in: beamformer

        correlator:
            bit: blade_bit
            configuration: correlator
            input:
                in: transport
        correlator_writer:
            bit: filesystem_bit
            configuration: correlator_writer
            input:
                in: correlator

# Nodes

ata_standard_rx:
    mode: ata
    gpu_device_id: 0
    interface_address: "0000:c1:00.1"
    master_core: 0
    worker_core: 1
    max_concurrent_bursts: 64
    packets_per_burst: 8192
    max_concurrent_blocks: 32
    output_pool_size: 128
    sorter_depth: 8
    enable_csv_logging: true
    total_block:
        number_of_antennas: 28
        number_of_channels: 1
        number_of_samples: 65536
        number_of_polarizations: 2
    partial_block:
        number_of_antennas: 1
        number_of_channels: 1
        number_of_samples: 512
        number_of_polarizations: 2
    offset_block:
        number_of_antennas: 0
        number_of_channels: 33
        number_of_samples: 0
        number_of_polarizations: 0

beamformer:
    input_shape:
        number_of_antennas: 28
        number_of_channels: 1
        number_of_samples: 65536
        number_of_polarizations: 2
    output_shape:
        number_of_antennas: 1
        number_of_channels: 1
        number_of_samples: 65536
        number_of_polarizations: 2
    number_of_buffers: 4
    mode: beamformer
    options:

beamformer_writer:
    mode: simple_writer
    file_path: ./output_beamformer.bin

correlator:
    input_shape:
        number_of_antennas: 28
        number_of_channels: 1
        number_of_samples: 65536
        number_of_polarizations: 2
    output_shape:
        number_of_antennas: 406
        number_of_channels: 65536
        number_of_samples: 1
        number_of_polarizations: 4
    number_of_buffers: 4
    mode: correlator
    options:

correlator_writer:
    mode: simple_writer_rdma
    file_path: ./output_correlator.bin
