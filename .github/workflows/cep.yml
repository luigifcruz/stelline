name: CEP Plugin Build

on:
  workflow_call:

permissions:
  contents: read

jobs:
  build:
    name: build (${{ matrix.tag }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - tag: x86_64-cuda
            runner: ubuntu-latest
            base: ghcr.io/luigifcruz/cyberether:ubuntu24-x86_64-cuda
          - tag: aarch64-cuda
            runner: ubuntu-24.04-arm
            base: ghcr.io/luigifcruz/cyberether:ubuntu24-aarch64-cuda

    steps:
      - name: Checkout
        uses: actions/checkout@v4.3.1

      - name: Build CEP artifact
        run: |
          set -euo pipefail
          docker run --rm \
            --env BUILD_TYPE=release \
            --env CEP_OUTPUT_DIR=.dist/${{ matrix.tag }} \
            --volume "${PWD}:/workspace" \
            --workdir /workspace \
            "${{ matrix.base }}" \
            sh -lc '
              set -eu
              workspace_owner="$(stat -c "%u:%g" /workspace)"
              trap '\''chown -R "${workspace_owner}" /workspace/.dist /workspace/build /workspace/subprojects 2>/dev/null || true'\'' EXIT
              export DEBIAN_FRONTEND=noninteractive
              apt-get update --fix-missing
              apt-get install -y --no-install-recommends cmake libdpdk-dev
              rm -rf /var/lib/apt/lists/*
              git config --global --add safe.directory /workspace
              sh tools/ci/package_cep.sh
            '

      - name: Stage artifact
        run: |
          set -euo pipefail
          mkdir -p .dist/artifacts
          test -s .dist/${{ matrix.tag }}/stelline.cep
          cp .dist/${{ matrix.tag }}/stelline.cep .dist/artifacts/stelline-ubuntu24-${{ matrix.tag }}.cep

      - uses: actions/upload-artifact@v4.6.2
        with:
          name: stelline-cep-ubuntu24-${{ matrix.tag }}
          path: .dist/artifacts/stelline-ubuntu24-${{ matrix.tag }}.cep

  merge:
    name: merge
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4.3.1

      - uses: actions/download-artifact@v4.3.0
        with:
          pattern: stelline-cep-ubuntu24-*-cuda
          path: .dist/ceps
          merge-multiple: true

      - name: Merge CEP bundles
        run: |
          set -euo pipefail
          python3 tools/merger.py \
            --output .dist/artifacts/stelline.cep \
            .dist/ceps/stelline-ubuntu24-x86_64-cuda.cep \
            .dist/ceps/stelline-ubuntu24-aarch64-cuda.cep

      - uses: actions/upload-artifact@v4.6.2
        with:
          name: stelline-cep-ubuntu24-cuda
          path: .dist/artifacts/stelline.cep
