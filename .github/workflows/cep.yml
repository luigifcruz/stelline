name: CEP Plugin Build

on:
  workflow_call:

permissions:
  contents: read

jobs:
  build:
    name: build (${{ matrix.tag }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - tag: x86_64-cuda
            runner: ubuntu-latest
            base: ghcr.io/luigifcruz/cyberether:ubuntu24-x86_64-cuda
          - tag: aarch64-cuda
            runner: ubuntu-24.04-arm
            base: ghcr.io/luigifcruz/cyberether:ubuntu24-aarch64-cuda

    steps:
      - name: Checkout
        uses: actions/checkout@v4.3.1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.12.0

      - name: Build CEP artifact
        uses: docker/build-push-action@v5.4.0
        with:
          context: .
          file: ./Dockerfile
          target: artifact
          outputs: type=local,dest=.dist/${{ matrix.tag }}
          build-args: |
            BASE_IMAGE=${{ matrix.base }}
            BUILD_TYPE=release

      - name: Stage artifact
        run: |
          set -euo pipefail
          mkdir -p .dist/artifacts
          test -s .dist/${{ matrix.tag }}/stelline.cep
          cp .dist/${{ matrix.tag }}/stelline.cep .dist/artifacts/stelline-ubuntu24-${{ matrix.tag }}.cep

      - uses: actions/upload-artifact@v4.6.2
        with:
          name: stelline-cep-ubuntu24-${{ matrix.tag }}
          path: .dist/artifacts/stelline-ubuntu24-${{ matrix.tag }}.cep

  merge:
    name: merge
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4.3.1

      - uses: actions/download-artifact@v4.3.0
        with:
          pattern: stelline-cep-ubuntu24-*-cuda
          path: .dist/ceps
          merge-multiple: true

      - name: Merge CEP bundles
        run: |
          set -euo pipefail
          python3 tools/merger.py \
            --output .dist/artifacts/stelline-ubuntu24-cuda.cep \
            .dist/ceps/stelline-ubuntu24-x86_64-cuda.cep \
            .dist/ceps/stelline-ubuntu24-aarch64-cuda.cep

      - uses: actions/upload-artifact@v4.6.2
        with:
          name: stelline-cep-ubuntu24-cuda
          path: .dist/artifacts/stelline-ubuntu24-cuda.cep
